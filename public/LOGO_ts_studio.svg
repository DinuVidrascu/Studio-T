      <rect x="304" y="512" width="30" height="34" rx="5"/>
      <rect x="304" y="552" width="30" height="34" rx="5"/>
    </g>
    <!-- round coffee table -->
    <circle cx="372" cy="512" r="22" stroke-width="2"/>
